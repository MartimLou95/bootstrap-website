<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — Martim</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- ===== BOOTSTRAP HAMBURGER NAV ===== -->
    <nav class="navbar navbar-expand-md bg-light border-bottom">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Martim</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
          aria-controls="mainNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <div class="navbar-nav ms-auto">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="learning.html">Learning</a>
            <a class="nav-link" href="contact.html">Contact</a>
          </div>
        </div>
      </div>
    </nav>

    <!-- ===== GRID SHELL ===== -->
    <div class="container my-4">
      <div class="row">
        <!-- LEFT: other ways to reach me -->
        <aside class="col-md-3">
          <p class="text-uppercase text-muted small fw-semibold">Elsewhere</p>
          <nav class="nav flex-column">
            <a class="nav-link px-0" href="mailto:martimcolour@gmail.com">Email</a>
            <a
              class="nav-link px-0"
              href="https://github.com/MartimLou95"
              rel="noopener"
              target="_blank"
              >GitHub</a
            >
          </nav>
        </aside>

        <!-- RIGHT: the contact form -->
        <main class="col-md-9">
          <h1 class="mb-3">Get in touch</h1>
          <p class="lead">Drop me a message and I'll get back to you.</p>

          <form action="#" method="post" class="col-md-8">
            <div class="mb-3">
              <label for="name" class="form-label">Name</label>
              <input type="text" id="name" name="name" class="form-control" required />
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" id="email" name="email" class="form-control" required />
            </div>

            <div class="mb-3">
              <label for="message" class="form-label">Message</label>
              <textarea
                id="message"
                name="message"
                rows="6"
                class="form-control"
                required
              ></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Send message</button>
          </form>
        </main>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
