<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — Martim</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="d-flex flex-column min-vh-100">
    <!-- ===== BOOTSTRAP HAMBURGER NAV ===== -->
    <nav class="navbar navbar-expand-md bg-light border-bottom sticky-top shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Martim</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
          aria-controls="mainNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <div class="navbar-nav ms-auto">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="learning.html">Learning</a>
            <a class="nav-link active" href="contact.html">Contact</a>
          </div>
        </div>
      </div>
    </nav>

    <!-- ===== GRID SHELL ===== -->
    <div class="container my-4">
      <!-- HERO HEADER -->
      <div class="p-4 p-md-5 mb-4 bg-body-tertiary rounded-3 text-center">
        <h1 class="display-5 fw-bold">Get in touch</h1>
        <p class="lead mb-0">Drop me a message and I'll get back to you.</p>
      </div>

      <div class="row">
        <!-- LEFT: other ways to reach me -->
        <aside class="col-md-3">
          <p class="text-uppercase text-muted small fw-semibold">Elsewhere</p>
          <nav class="nav flex-column">
            <a class="nav-link px-0" href="mailto:martimcolour@gmail.com">
              <i class="bi bi-envelope me-2"></i>Email
            </a>
            <a
              class="nav-link px-0"
              href="https://github.com/MartimLou95"
              rel="noopener"
              target="_blank"
            >
              <i class="bi bi-github me-2"></i>GitHub
            </a>
          </nav>
        </aside>

        <!-- RIGHT: the contact form -->
        <main class="col-md-9">
          <section class="card border-0 shadow-sm">
            <div class="card-header bg-primary-subtle fw-semibold">
              <i class="bi bi-envelope-paper me-2"></i>Send a message
            </div>
            <div class="card-body">
              <form action="#" method="post" class="col-md-9">
                <div class="mb-3">
                  <label for="name" class="form-label">Name</label>
                  <input type="text" id="name" name="name" class="form-control" required />
                </div>

                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input type="email" id="email" name="email" class="form-control" required />
                </div>

                <div class="mb-3">
                  <label for="message" class="form-label">Message</label>
                  <textarea
                    id="message"
                    name="message"
                    rows="6"
                    class="form-control"
                    required
                  ></textarea>
                </div>

                <button type="submit" class="btn btn-primary">
                  <i class="bi bi-send me-2"></i>Send message
                </button>
              </form>
            </div>
          </section>
        </main>
      </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer class="bg-body-tertiary border-top py-4 mt-auto">
      <div class="container d-flex flex-column flex-sm-row justify-content-between align-items-center gap-2 text-muted small">
        <span>© 2026 Martim · Learning in public</span>
        <span>Built with <i class="bi bi-bootstrap-fill"></i> Bootstrap</span>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
